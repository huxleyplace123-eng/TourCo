ing:["Closed-toe shoes","Sunscreen","Change of clothes","Cash for remaining balance"],bestTimeToGo:"Morning",transport:"Ask TripNest to confirm pickup or meeting point before booking.",comms:"Responsive",length:"1:58",videoLabel:"What It Actually Looks Like"},a4:{level:"Tested by John",recommended:!0,badge:"Best for Couples",shortTake:"The easy win of any trip \u2014 sunset, snorkeling, open bar, and almost everyone loves it.",take:"I'd put this on almost any itinerary. It's relaxed, the crew is great with families and couples, and the sunset sail is genuinely beautiful. If you only do one boat day, do this one.",tip:"Get there for the earlier check-in so you get good seats at the front for sunset.",bestFor:["Couples","Family","Groups"],notIdealFor:["Anyone wanting high adrenaline"],whatToBring:["Swimsuit & towel","Reef-safe sunscreen","Light layer for the sail back","Cash for remaining balance"],bestTimeToGo:"Afternoon into sunset",transport:"Hotel pickup is usually included \u2014 we'll confirm it.",comms:"Highly Responsive",length:"1:42",videoLabel:"Is It Worth It?"},a5:{level:"Tested by John",recommended:!0,badge:"Easy First-Day Pick",shortTake:"Calm, easy, and family-friendly \u2014 a gentle intro to the water here.",take:"Good guide, calm water at Marino Ballena, and easy enough for first-timers and kids. Not a thrill ride, but that's the point.",tip:"Bring reef-safe sunscreen only \u2014 they're strict about protecting the reef, and they're right to be.",bestFor:["Family","Couples","Beginners"],notIdealFor:["Strong swimmers wanting deep reefs"],whatToBring:["Swimsuit","Reef-safe sunscreen","Towel"],bestTimeToGo:"Morning",transport:"Meeting point in Uvita \u2014 ask us to coordinate a ride if needed.",comms:"Responsive",length:"1:30",videoLabel:"Best For / Not Best For"},a6:{level:"Tested by John",recommended:!0,badge:"Easy First-Day Pick",shortTake:"Tamarindo's break is forgiving \u2014 most people stand up the first session.",take:"Patient instructors and a  are slick.",bestFor:["Adventure","Couples","Active families"],notIdealFor:["Limited mobility","Toddlers"],whatToBring:["Water shoes","Swimsuit","Water","Sunscreen"],bestTimeToGo:"Morning",transport:"Trailhead near Dominical \u2014 confirm 4x4 transfer with us.",comms:"Responsive",length:"1:40",videoLabel:"Before You Book This"},a9:{level:"Checked Out by John",recommended:!0,badge:"Best for Families",shortTake:"Reviewed the operator's season and boats \u2014 go in the right months and it's magic.",take:"Whale and dolphin sightings here are seasonal. I checked the operator's record and timing \u2014 when it's on, it's incredible. I'll tell you honestly if your dates aren't ideal.",tip:"Ask us about your travel dates before booking \u2014 timing is everything for this one.",bestFor:["Family","Couples","Nature lovers"],notIdealFor:["Off-season travelers expecting guarantees"],whatToBring:["Light jacket","Sunscreen","Camera"],bestTimeToGo:"Morning, in season",transport:"Departs Uvita / Marino Ballena.",comms:"Responsive",length:"1:33",videoLabel:"Is It Worth It?"},a15:{level:"Checked Out by John",recommended:!0,badge:"Premium Experience",shortTake:"Scoped the private waterfall and sunset spot \u2014 genuinely romantic, not a tourist conveyor belt.",take:"I checked out the route and the sunset point. It's private, unhurried, and actually romantic \u2014 not a crowded group thing. A lovely splurge for couples and honeymooners.",tip:"Add the photographer \u2014 couples almost always wish they had afterward.",bestFor:["Couples","Honeymooners"],notIdealFor:["Big groups","Tight budgets"],whatToBring:["Swimsuit","Nice-casual change for dinner","Camera"],bestTimeToGo:"Afternoon into sunset",transport:"Private transport is part of the experience.",comms:"Highly Responsive",length:"2:00",videoLabel:"What It Actually Looks Like"}},Um={level:"TripNest Verified",recommended:!1,badge:"TripNest Verified",shortTake:"Vetted by TripNest for pricing, communication, and fit. John hasn't pe
