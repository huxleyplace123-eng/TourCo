<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#04122E" />
    <title>TripNest — Costa Rica Adventure Concierge</title>
    <meta name="description" content="Costa Rica adventures, planned by locals. Vetted tours, transparent pricing, human support, and John's local recommendations." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; padding: 0; background: #04122E; color: #F3F7FF; -webkit-text-size-adjust: 100%; font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      * { box-sizing: border-box; }
      #root { min-height: 100vh; }
      ::selection { background: rgba(34,211,238,.3); color: #fff; }
      /* dark, slim scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #04122E; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(34,211,238,.4); }
      .tn-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #04122E; color: #fff; font-weight: 800; letter-spacing: -0.5px; font-size: 22px; }
      .tn-loading span { color: #22D3EE; }
      select option { color: #0B1A2E; }

      /* ── Touch targets: on coarse/touch pointers, guarantee ≥44px tap size ──
         Applies app-wide so small buttons/inputs are never fiddly on a phone.
         `.tn-dot` (pagination dots) opts out so they stay small but keep a
         padded, invisible 44px hit area via their own styles. */
      @media (pointer: coarse), (max-width: 820px) {
        button:not(.tn-dot), a[role="button"], select, input:not([type="range"]) {
          min-height: 44px;
        }
        button { touch-action: manipulation; }
      }

      /* Desktop layout switches (from the original build). */
      @media (min-width: 980px) {
        .hero-grid { grid-template-columns: 1fr 440px !important; }
        .two-col { grid-template-columns: 1fr 1fr !important; }
        .cat-grid { grid-template-columns: repeat(4, 1fr) !important; }
        .nav-links { display: flex !important; }
        .nav-cta { display: block !important; }
        .nav-burger { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"><div class="tn-loading">Trip<span>Nest</span></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
